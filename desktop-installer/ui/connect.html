<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Подключение - Paragraph Test System</title>
  <style>
    :root {
      --bg-main: #f1f2f5;
      --bg-nav: #243a61;
      --bg-nav-dark: #1f3254;
      --accent: #2c66d5;
      --text-main: #2f3540;
      --text-soft: #96a0b2;
      --border: #d6d9e0;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; height:100%; font-family: Segoe UI, Tahoma, Arial, sans-serif; color: var(--text-main); background: var(--bg-main); }
    .app { display:flex; min-height:100vh; }
    .nav {
      width: 330px;
      background: linear-gradient(180deg, var(--bg-nav), var(--bg-nav-dark));
      color: #fff;
      display:flex;
      flex-direction:column;
      border-right: 1px solid rgba(255,255,255,0.12);
    }
    .brand { padding: 28px 18px 20px; font-size: 46px; font-weight: 800; letter-spacing: .5px; }
    .brand .light { color: #fff; }
    .brand .blue { color: #4f87e9; }
    .menu-title { padding: 14px 18px; font-size: 30px; color: #6ea1ff; text-transform: uppercase; }
    .menu-item {
      padding: 18px 26px;
      font-size: 34px;
      display:flex;
      align-items:center;
      gap: 14px;
      background: rgba(0,0,0,0.24);
      border-top: 1px solid rgba(102,150,255,.3);
      border-bottom: 1px solid rgba(102,150,255,.3);
    }
    .menu-item .dot {
      width: 34px;
      height: 34px;
      border: 3px solid #fff;
      border-radius: 50%;
      opacity: .92;
    }
    .content {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 32px;
    }
    .panel {
      width: min(1180px, 100%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.08);
      padding: 30px 34px;
      display:flex;
      gap: 34px;
    }
    .col { flex:1; }
    .divider { width:1px; background: var(--border); }
    h2 { margin:0 0 18px; font-size: 34px; }
    .field { margin-bottom: 14px; }
    .field label { display:block; margin-bottom: 6px; font-size: 26px; color: #5f6b7b; }
    .row { display:flex; gap: 14px; }
    input[type=text], input[type=password], input[type=number] {
      width:100%;
      height: 56px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 28px;
      padding: 0 14px;
      outline:none;
      background:#fff;
    }
    input:focus { border-color: #6ea1ff; box-shadow: 0 0 0 2px rgba(78,136,235,0.22); }
    .checkbox { display:flex; align-items:center; gap: 10px; margin: 8px 0 16px; font-size: 28px; }
    .checkbox input { width: 22px; height: 22px; }
    .actions { display:flex; gap: 12px; align-items:center; }
    button {
      border: none;
      border-radius: 4px;
      height: 54px;
      padding: 0 22px;
      cursor:pointer;
      font-size: 26px;
      font-weight: 600;
    }
    .btn-primary { background: var(--accent); color:#fff; }
    .btn-secondary { background:#e9edf4; color:#2d3b4f; }
    .status {
      min-height: 34px;
      margin-top: 12px;
      font-size: 22px;
      color:#51617a;
    }
    .status.error { color:#b62424; }
    .status.ok { color:#187a39; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="nav">
      <div class="brand"><span class="light">PARAGRAPH</span><span class="blue">TEST</span></div>
      <div class="menu-title">Клиент</div>
      <div class="menu-item"><span class="dot"></span><span>Подключение</span></div>
    </aside>
    <main class="content">
      <section class="panel">
        <div class="col">
          <h2>Подключение</h2>
          <div class="row">
            <div class="field" style="flex:2">
              <label for="host">IP адрес</label>
              <input id="host" type="text" placeholder="127.0.0.1" />
            </div>
            <div class="field" style="flex:1">
              <label for="port">Порт</label>
              <input id="port" type="number" placeholder="50200" />
            </div>
          </div>
          <div class="field">
            <label for="module_name">Название модуля</label>
            <input id="module_name" type="text" placeholder="testModule" />
          </div>
          <div class="field">
            <label for="software_name">Имя софта</label>
            <input id="software_name" type="text" placeholder="softName" />
          </div>
          <div class="actions">
            <button id="disconnect_btn" class="btn-secondary" type="button">Отключиться</button>
          </div>
        </div>
        <div class="divider"></div>
        <div class="col">
          <h2>Авторизация</h2>
          <div class="field">
            <label for="login">Логин</label>
            <input id="login" type="text" />
          </div>
          <div class="field">
            <label for="password">Пароль</label>
            <input id="password" type="password" />
          </div>
          <label class="checkbox">
            <input id="remember_password" type="checkbox" checked />
            <span>Запомнить пароль</span>
          </label>
          <div class="actions">
            <button id="connect_btn" class="btn-primary" type="button">Войти</button>
          </div>
          <div id="status" class="status"></div>
        </div>
      </section>
    </main>
  </div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const statusEl = $("status");

  function setStatus(text, kind) {
    statusEl.textContent = text || "";
    statusEl.className = "status" + (kind ? " " + kind : "");
  }

  async function loadSaved() {
    if (!window.pywebview || !window.pywebview.api) return;
    try {
      const cfg = await window.pywebview.api.get_saved_connection();
      $("host").value = cfg.host || "127.0.0.1";
      $("port").value = cfg.port || 50200;
      $("module_name").value = cfg.module_name || "testModule";
      $("software_name").value = cfg.software_name || "softName";
      $("login").value = cfg.login || "";
      $("password").value = cfg.password || "";
      $("remember_password").checked = !!cfg.remember_password;
    } catch (e) {
      setStatus("Не удалось загрузить сохраненные параметры.", "error");
    }
  }

  async function connect() {
    if (!window.pywebview || !window.pywebview.api) {
      setStatus("Desktop API недоступен.", "error");
      return;
    }
    setStatus("Подключение и запуск системы...", "");
    const payload = {
      host: $("host").value.trim(),
      port: Number($("port").value || 0),
      module_name: $("module_name").value.trim(),
      software_name: $("software_name").value.trim(),
      login: $("login").value.trim(),
      password: $("password").value,
      remember_password: $("remember_password").checked,
    };
    try {
      const res = await window.pywebview.api.connect(payload);
      if (!res || !res.ok) {
        setStatus((res && res.error) || "Ошибка подключения.", "error");
        return;
      }
      setStatus("Подключено.", "ok");
    } catch (e) {
      setStatus("Ошибка запуска backend.", "error");
    }
  }

  async function disconnect() {
    if (!window.pywebview || !window.pywebview.api) return;
    try {
      await window.pywebview.api.disconnect();
      setStatus("Отключено.", "ok");
    } catch (e) {
      setStatus("Ошибка отключения.", "error");
    }
  }

  window.addEventListener("pywebviewready", loadSaved);
  $("connect_btn").addEventListener("click", connect);
  $("disconnect_btn").addEventListener("click", disconnect);
})();
</script>
</body>
</html>
